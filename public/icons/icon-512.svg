<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="b"><circle cx="256" cy="256" r="255"/></clipPath>
  </defs>
  <!-- Bottom half: white -->
  <circle cx="256" cy="256" r="256" fill="white"/>
  <!-- Top half: black -->
  <path d="M 0 256 A 256 256 0 0 1 512 256 Z" fill="#111827"/>
  <!-- Gold horseshoe — opens downward, arms at 60° from vertical
       outer r=190: tips at (420.5,161) and (91.5,161)
       inner r=115: tips at (355.6,198.5) and (156.4,198.5) -->
  <path d="M 420.5 161 A 190 190 0 0 0 91.5 161 L 156.4 198.5 A 115 115 0 0 1 355.6 198.5 Z" fill="#fbbf24"/>
  <!-- Black band at equator -->
  <rect x="0" y="237" width="512" height="38" fill="#111827" clip-path="url(#b)"/>
  <!-- Center button (drawn last so it sits on top of the band and top half) -->
  <circle cx="256" cy="256" r="72" fill="white"/>
  <circle cx="256" cy="256" r="72" fill="none" stroke="#111827" stroke-width="22"/>
</svg>
